# Optional tool settings for the `aiuse` CLI.
# Copy to: $XDG_CONFIG_HOME/aiuse/config.toml  (or ~/.config/aiuse/config.toml)
#
# This file is separate from services.yaml (plans / analysis thresholds).
# Both are optional; built-in defaults apply when a file is missing.

[timeouts]
# Wall-clock seconds for every external CLI (cswap, codexbar, tokscale).
# Tools either return quickly or hang — long budgets only delay failure.
default = 45

# Optional per-tool overrides (omit to use default):
# cswap = 45
# codexbar = 45
# codexbar_discovery = 45   # `codexbar config providers` (local, usually ms)
# tokscale = 45

# CLI `--timeout` / `-t` sets force and overrides every tool for that run.
