---
# Copy to services.yaml (or pass --config) to override plan metadata
# and analysis thresholds for use-it-or-lose-it recommendations.

analysis:
  # Scoring: pace (default) | multi_dim | legacy
  scoring_mode: pace
  pace:
    waste_alert_fraction: 0.30
    min_elapsed_fraction: 0.15
    conserve_min_lead_hours: 4.0

  # Flag a quota window when remaining % is at or above this (legacy path)
  min_remaining_percent: 40
  # Only flag windows that reset within this many days
  max_days_until_reset: 14
  # Flag sooner if remaining is very high (near-total waste risk)
  urgent_remaining_percent: 70
  urgent_days_until_reset: 7

  # Phase 4 (experimental): learn actual consumption rates from persisted snapshots.
  learn_from_history: false
  snapshot_retention_days: 90

  # ---- consumption flexibility (Phase 1: data-only, Phase 2: scoring) ----

  # How many hours per day you're awake and able to use AI tools.
  # Used to compute active cycles for throttled window value-at-risk.
  waking_hours_per_day: 16

  # Alert fatigue: both thresholds must be met for an alert to appear.
  min_value_at_risk_usd: 0.50       # absolute dollar floor
  min_value_fraction: 0.05           # per-provider fraction of monthly plan price

  # Burn-rate assumptions for "what would I need to do" estimates.
  # "tokens" unit uses max_sustained_tokens_per_minute;
  # "requests" unit uses max_requests_per_minute.
  max_sustained_tokens_per_minute: 200000
  max_requests_per_minute: 0.5

  # Default flexibility per window duration.
  # 0.0 = fully throttled (must spread across multiple refill cycles).
  # 1.0 = fully burstable (can consume entire window in one session).
  consumption_flexibility_defaults:
    5h: 0.0
    weekly: 0.7
    monthly: 1.0

  # Per-provider overrides for flexibility and capacity metadata.
  provider_overrides:
    claude:
      shared_allotment: true   # 5h ⊂ weekly; pace-score governing window only
      5h:
        flexibility: 0.0
        refill_capacity_unit: "requests"
        refill_capacity: 45
    gemini:
      shared_allotment: true
      5h:
        flexibility: 0.0
        refill_capacity_unit: "requests"
        refill_capacity: 50
    opencode:
      shared_allotment: true   # 5h ⊂ weekly ⊂ monthly Go budget
    grok:
      weekly:
        flexibility: 0.5
        refill_capacity_unit: "requests"
        refill_capacity: 100

# Plan metadata for value-at-risk and display context.
plans:
  codex:
    name: "ChatGPT / Codex Plus"
    notes: "Weekly Codex rate limits reset; unused weekly quota is lost."
    monthly_price: 20
  claude:
    name: "Claude Pro / Max"
    notes: "5-hour and weekly limits on subscription; multi-account via cswap."
    monthly_price: 20
    # Optional: per-duration value multiplier (Claude 5h blocks are higher-quality per dollar)
    value_multiplier:
      5h: 1.4
  cursor:
    name: "Cursor"
    notes: "Monthly included usage resets with billing cycle."
    monthly_price: 20
  copilot:
    name: "GitHub Copilot"
    notes: "Premium request quotas typically reset monthly."
    monthly_price: 10
  grok:
    name: "SuperGrok"
    notes: "Credits / rate windows reset on a short cycle."
    monthly_price: 30
  gemini:
    name: "Google AI Pro / Ultra"
    notes: "Often exposed via Antigravity / Gemini CLI."
    monthly_price: 20
  opencode:
    name: "OpenCode Go"
    notes: "Has 5h / weekly / monthly windows when subscribed."
    monthly_price: 10
  openrouter:
    name: "OpenRouter (prepaid)"
    notes: "API credits usually roll until spent (not use-or-lose)."
  openai:
    name: "OpenAI API"
    notes: "Pay-as-you-go; no use-or-lose monthly allotment unless you buy credits with expiry."

collectors:
  cswap:
    enabled: true
  codexbar:
    enabled: true
    # "enabled" honors CodexBar's configured provider list. "all" queries every
    # supported provider. A CSV queries each named provider separately.
    providers: enabled
  tokscale:
    enabled: true
