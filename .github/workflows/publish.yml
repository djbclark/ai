# Publish aiuse to PyPI when a GitHub Release is published.
#
# One-time setup on https://pypi.org/manage/account/publishing/ :
#   Owner: djbclark
#   Project name: aiuse
#   Workflow: publish.yml
#   Environment name: pypi  (create matching GitHub Environment)
name: publish

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aiuse
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
